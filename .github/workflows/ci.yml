name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies (uv venv + dev extras)
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check .

      - name: Test
        run: .venv/bin/pytest tests/ -v --tb=short --ignore=tests/test_live_e2e.py

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mnemos:ci .
