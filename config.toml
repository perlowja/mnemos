# MNEMOS Configuration
# Modular system with integrated compression and quality tracking

[database]
host = "localhost"
port = 5432
database = "mnemos"
user = "mnemos"
password = ""
pool_min_size = 10
pool_max_size = 20

[compression]
enabled = true
default_strategy = "token_filter"  # 'token_filter' or 'sac'

[compression.storage]
enabled = true

[compression.storage.ratios]
reasoning = 0.45
code_generation = 0.30
architecture_design = 0.50
api_design = 0.40
data_modeling = 0.45
debugging = 0.35
refactoring = 0.40

[compression.rehydration]
enabled = true

[compression.rehydration.tier_ratios]
"1" = 0.20
"2" = 0.35
"3" = 0.50
"4" = 1.00

[compression.graeae]
enabled = true
store_uncompressed = true
store_compressed = true
compression_ratio = 0.4

[compression.quality]
enabled = true
analyzer = "heuristic"
warn_if_rating_below = 80
error_if_rating_below = 70

[compression.quality.requirements]
security_review = 95
architecture_design = 90
code_generation = 88
reasoning = 85
general = 80

[compression.storage_strategy]
always_store_original = true

[hooks]
enabled = true
session_start = true
prompt_submit = true
memory_write = true
memory_read = false

[memory]
tier1_budget = 10000
tier2_budget = 20000
tier3_budget = 30000
tier4_budget = 50000

[memory.task_detection]
infrastructure = ["deploy", "devops", "infrastructure", "kubernetes", "docker", "cloud"]
reasoning = ["architecture", "design", "decision", "plan", "strategy", "analysis"]
code = ["code", "implementation", "debug", "refactor", "algorithm"]
project = ["project", "planning", "timeline", "milestone", "task"]
complex = ["complex", "sophisticated", "integration", "system"]

[bundles]
enabled = true
fallback_on_no_graeae = true
default_bundle = "general_reasoning"

[bundles.model_variants.code_generation]
primary = "xai_grok_4_code"
secondary = "gpt_5_2_fast"
tertiary = "together_ai_code"

[bundles.model_variants.architecture_design]
primary = "gpt_5_2"
secondary = "gemini_3_pro"
tertiary = "groq_llama_3_3"

[bundles.model_variants.api_design]
primary = "gpt_5_2"
secondary = "gemini_3_pro"
tertiary = "groq_llama_3_3"

[bundles.model_variants.data_modeling]
primary = "gemini_3_pro"
secondary = "gpt_5_2"
tertiary = "groq_llama_3_3"

[bundles.model_variants.reasoning]
primary = "gpt_5_2"
secondary = "gemini_3_pro"
tertiary = "groq_llama_3_3"

[routing]
enabled = true
graeae_url = "http://localhost:5001"  # Override via GRAEAE_URL env var
fallback_timeout = 5

[routing.modes]
local = "Use local VLLM (zero cost)"
external = "Use multi-LLM consensus ($0.02-0.05)"
auto = "Intelligent routing (adaptive)"

# ── GRAEAE provider registry ──────────────────────────────────────────────────
# Add a new provider by adding a [graeae.providers.<name>] stanza here and
# an entry under llm_providers in ~/.api_keys_master.json. No code changes needed.
#
# Fields:
#   url      — API endpoint
#   model    — model identifier sent in the request
#   weight   — base consensus weight (0.0–1.0); adjusted dynamically by quality tracker
#   api      — adapter style: "openai" | "anthropic" | "gemini"
#   key_name — key under llm_providers in ~/.api_keys_master.json
#   enabled  — set false to disable without removing the stanza

[graeae]
timeout = 30
cache_ttl = 3600

[graeae.providers.perplexity]
url      = "https://api.perplexity.ai/chat/completions"
model    = "sonar-pro"
weight   = 0.88
api      = "openai"
key_name = "perplexity"
enabled  = true

[graeae.providers.groq]
url      = "https://api.groq.com/openai/v1/chat/completions"
model    = "llama-3.3-70b-versatile"
weight   = 0.63
api      = "openai"
key_name = "groq"
enabled  = true

[graeae.providers.claude_opus]
url      = "https://api.anthropic.com/v1/messages"
model    = "claude-opus-4-6"
weight   = 0.85
api      = "anthropic"
key_name = "claude-opus"
enabled  = true

[graeae.providers.xai]
url      = "https://api.x.ai/v1/chat/completions"
model    = "grok-3"
weight   = 0.48
api      = "openai"
key_name = "xai"
enabled  = true

[graeae.providers.openai]
url      = "https://api.openai.com/v1/chat/completions"
model    = "gpt-5.2"
weight   = 0.82
api      = "openai"
key_name = "openai"
enabled  = true

[graeae.providers.gemini]
url      = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent"
model    = "gemini-3.1-pro-preview"
weight   = 0.81
api      = "gemini"
key_name = "gemini"
enabled  = true

[graeae.providers.together]
url      = "https://api.together.xyz/v1/chat/completions"
model    = "meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo"
weight   = 0.72
api      = "openai"
key_name = "together_ai"
enabled  = true

[integrations.macrodata]
enabled = false
hook_adapter = true
state_sync = true

[integrations.external_lms]
enabled = true

[logging]
level = "INFO"
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
file = "/tmp/mnemos.log"
max_bytes = 10485760
backup_count = 5

[api]
host = "0.0.0.0"
port = 5000
debug = false
workers = 4

[features]
compression = true
hooks = true
quality_tracking = true
audit_logging = true
semantic_search = true

[deployment]
profile = "personal"

[auth]
enabled = false
personal_user_id = "default"
default_namespace = "default"
mode = "bearer"

[multiuser]
rls_enabled = false
namespaces_enabled = false
max_keys_per_user = 10
